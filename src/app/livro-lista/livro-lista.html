<main class="container mt-4 page-container">
  <h1 class="page-title">Catálogo de Livros</h1>

  <div class="card default-card mt-4">
    <div class="card-body p-0">
      <div class="table-wrapper">
        <table class="table table-striped table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Título</th>
              <th>Resumo</th>
              <th>Editora</th>
              <th>Autores</th>
              <th class="text-center">Ações</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let livro of livros">
              <td>
                {{ livro.titulo }}
              </td>

              <td>
                {{ livro.resumo }}
              </td>

              <td>
                {{ obterNome(livro.codEditora) }}
              </td>

              <td>
                <ul>
                  <li *ngFor="let autor of livro.autores">
                    {{ autor }}
                  </li>
                </ul>
              </td>

              <td class="text-center">
                <button class="btn btn-outline-primary px-3 me-2" (click)="editar(livro)">
                  Editar
                  <i class="bi bi-pencil-square"></i>
                </button>
                <button class="btn btn-outline-danger px-3" (click)="excluir(livro.codigo)">
                  Excluir
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>
