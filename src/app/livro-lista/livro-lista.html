<main class="container mt-4 page-container">
  <h1 class="page-title">Catálogo de Livros</h1>

  <div class="search-container mt-4">
    <i class="bi bi-search search-icon"></i>

    <input
      type="text"
      class="search-input"
      placeholder="Buscar por título, autor ou editora..."
      [(ngModel)]="termoBusca"
    />
  </div>

  <div class="card default-card mt-4">
    <div class="card-body p-0">
      <div class="empty-state" *ngIf="livrosFiltrados.length === 0">
        <div class="empty-icon">
          <i class="bi bi-journal-x"></i>
        </div>

        <h2>Nenhum livro encontrado</h2>

        <p>Você ainda não possui livros cadastrados no sistema.</p>

        <a routerLink="/dados" class="btn btn-dark modern-submit-btn px-4 py-2 mt-2">
          <i class="bi bi-plus-circle me-2"></i>
          Adicionar Novo Livro
        </a>
      </div>

      <div class="table-wrapper" *ngIf="livrosFiltrados.length > 0">
        <table class="table align-middle mb-0">
          <thead>
            <tr>
              <th>
                <i class="bi bi-book me-2"></i>
                Título
              </th>

              <th>
                <i class="bi bi-card-text me-2"></i>
                Resumo
              </th>

              <th>
                <i class="bi bi-building me-2"></i>
                Editora
              </th>

              <th>
                <i class="bi bi-people me-2"></i>
                Autores
              </th>

              <th class="text-center">
                <i class="bi bi-gear me-2"></i>
                Ações
              </th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let livro of livrosFiltrados">
              <td>{{ livro.titulo }}</td>

              <td>{{ livro.resumo }}</td>

              <td>{{ obterNome(livro.codEditora) }}</td>

              <td>
                <div class="authors-container">
                  <span class="author-tag" *ngFor="let autor of livro.autores">
                    {{ autor }}
                  </span>
                </div>
              </td>

              <td class="text-center">
                <button class="btn action-icon-btn me-2" (click)="editar(livro)">
                  <i class="bi bi-pencil-square"></i>
                </button>

                <button class="btn action-icon-btn" (click)="excluir(livro.codigo)">
                  <i class="bi bi-trash3"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" *ngIf="modalAberto" (click)="fecharModal()">
    <div class="modal-container-custom" (click)="$event.stopPropagation()">
      <div class="modal-header-custom">
        <div class="modal-title-container">
          <i class="bi bi-pencil-square"></i>

          <h2>Editar Livro</h2>
        </div>
      </div>

      <div class="modal-body-custom">
        <div class="mb-3">
          <label class="form-label">Título</label>

          <input type="text" class="form-control" [(ngModel)]="livroSelecionado.titulo" />
        </div>

        <div class="mb-3">
          <label class="form-label">Resumo</label>

          <textarea class="form-control" rows="3" [(ngModel)]="livroSelecionado.resumo"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Autores</label>

          <textarea class="form-control" rows="5" [(ngModel)]="autoresEdicao"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Editora</label>

          <select class="form-select" [(ngModel)]="livroSelecionado.codEditora">
            <option *ngFor="let editora of editoras" [ngValue]="editora.codEditora">
              {{ editora.nome }}
            </option>
          </select>
        </div>
      </div>

      <div class="modal-footer-custom">
        <button class="btn btn-outline-secondary" (click)="fecharModal()">Cancelar</button>

        <button class="btn btn-dark px-4" (click)="salvarEdicao()">Salvar</button>
      </div>
    </div>
  </div>
</main>
